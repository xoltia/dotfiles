[org/gnome/mutter]
center-new-windows = true
dynamic-tiling = true
edge-tiling = true

[org/gtk/settings/file-chooser/clock-format]
clock-format = '24h'

[org/gnome/desktop/interface]
color-scheme = "prefer-dark"

[org/gnome/desktop/input-sources]
sources = [('xkb', 'us'), ('ibus', 'mozc-jp')]

[org/gnome/shell]
enabled-extensions = ['blur-my-shell@aunetx']
favorite-apps = ['org.mozilla.firefox.desktop', 'org.gnome.Console.desktop', 'org.gnome.Nautilus.desktop', 'code.desktop', 'dev.vencord.Vesktop.desktop', 'com.spotify.Client.desktop']

[org/gnome/shell/extensions/blur-my-shell]
color-and-noise = false

[org/gnome/shell/extensions/blur-my-shell/applications]
blur = false

[org/gnome/shell/extensions/blur-my-shell/panel]
blur = false


[org/gnome/settings-daemon/plugins/media-keys]
custom-keybindings = ['/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/']

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0]
binding = '<Ctrl><Alt>t'
command = 'kgx'
name = 'Open Console'

